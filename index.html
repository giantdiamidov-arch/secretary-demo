<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セクレタリー【練習用デモ】</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0f1923; color: #fff; min-height: 100vh; }

  .demo-banner {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: #7a3a00; color: #ffcc44; text-align: center;
    font-size: 13px; font-weight: 700; padding: 6px;
    letter-spacing: 0.05em;
  }

  /* ── セットアップ ── */
  #setup { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; padding-top:60px; }
  #setup h2 { font-size:20px; margin-bottom:8px; color:#dfaf4a; }
  #setup .sub { font-size:13px; color:#7a8a99; margin-bottom:12px; }
  .demo-note { font-size:13px; color:#ffcc44; background:#2a1a00; border:1px solid #7a5a00; border-radius:10px; padding:10px 14px; margin-bottom:20px; max-width:480px; width:100%; line-height:1.6; }
  .gender-tabs { display:flex; gap:12px; margin-bottom:20px; width:100%; max-width:480px; }
  .gender-tab { flex:1; padding:14px; background:#1a2634; border:2px solid #2a3a4a; border-radius:12px; text-align:center; cursor:pointer; font-size:16px; font-weight:700; transition:all 0.2s; }
  .gender-tab.active.mag { border-color:#4a9eff; background:#1a2a3e; color:#4a9eff; }
  .gender-tab.active.wag { border-color:#df4adf; background:#2e1a2e; color:#df4adf; }
  .apparatus-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; max-width:480px; margin-bottom:24px; }
  .app-btn { padding:20px 10px; background:#1a2634; border:2px solid #2a3a4a; border-radius:14px; text-align:center; cursor:pointer; transition:all 0.2s; }
  .app-btn.selected { border-color:#dfaf4a; background:#2e261a; }
  .app-btn .icon { font-size:28px; margin-bottom:6px; }
  .app-btn .label { font-size:18px; font-weight:800; }
  .app-btn .full { font-size:11px; color:#7a8a99; margin-top:2px; }
  .btn-enter { width:100%; max-width:480px; padding:18px; background:#7a5a1a; border:none; border-radius:16px; color:#fff; font-size:18px; font-weight:700; cursor:pointer; }
  .btn-enter:disabled { background:#2a3a4a; color:#4a5a6a; cursor:not-allowed; }

  /* ── メイン ── */
  #main-view { display:none; flex-direction:column; min-height:100vh; padding-top:30px; }
  .header { background:#1a2634; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #2a3a4a; }
  .apparatus-badge { font-size:20px; font-weight:800; color:#dfaf4a; }
  .apparatus-full { font-size:12px; color:#7a8a99; }
  .demo-badge-sm { padding:4px 10px; background:#2a1a00; border:1px solid #7a5a00; border-radius:6px; color:#ffcc44; font-size:11px; font-weight:700; }

  /* ヒント */
  .hint-bar { background:#1a2a1a; border-bottom:1px solid #2a4a2a; padding:8px 20px; font-size:12px; color:#7aaa7a; line-height:1.5; }

  .content { padding:20px; }

  /* 選手選択 */
  .select-panel { background:#1a2634; border:1px solid #2a3a4a; border-radius:16px; padding:20px; margin-bottom:20px; }
  .select-panel h3 { font-size:15px; color:#dfaf4a; margin-bottom:14px; }
  .athlete-list { display:flex; flex-direction:column; gap:6px; max-height:240px; overflow-y:auto; }
  .athlete-item { display:flex; align-items:center; gap:12px; padding:10px 14px; background:#111d2a; border:1px solid #2a3a4a; border-radius:10px; cursor:pointer; transition:all 0.15s; }
  .athlete-item:hover { border-color:#dfaf4a; }
  .athlete-item.used { opacity:0.35; cursor:not-allowed; pointer-events:none; }
  .bib { font-size:13px; font-weight:700; color:#dfaf4a; min-width:40px; }
  .cat-tag { font-size:11px; padding:2px 8px; border-radius:10px; background:#1a2a4a; color:#4a9eff; white-space:nowrap; }
  .athlete-item .name { font-size:15px; font-weight:700; flex:1; }
  .athlete-item .club { font-size:12px; color:#7a8a99; }

  /* スコアカード */
  .score-card { background:#1a2634; border:1px solid #2a3a4a; border-radius:16px; padding:20px; margin-bottom:16px; }
  .score-card.confirmed { border-color:#2a5a3a; background:#141e18; }
  .card-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px 12px; margin-bottom:14px; }
  .header-left { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .bib-name { font-size:18px; font-weight:700; }
  .meta { font-size:12px; color:#7a8a99; display:flex; gap:8px; align-items:center; }
  .confirmed-badge { background:#1a5a2a; color:#4adf8f; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; }

  /* スコアグリッド */
  .scores-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(88px,1fr)); gap:7px; margin-bottom:14px; }
  .score-cell { background:#111d2a; border-radius:10px; padding:9px 6px; text-align:center; }
  .score-cell .lbl { font-size:10px; color:#7a8a99; margin-bottom:3px; text-transform:uppercase; letter-spacing:0.05em; }
  .score-cell .val { font-size:22px; font-weight:700; color:#fff; font-variant-numeric:tabular-nums; }
  .score-cell .val.empty { color:#3a4a5a; font-size:13px; }
  .score-cell .val.pending { color:#dfaf4a; font-size:13px; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .score-cell.d-cell .val { color:#df9f4a; }
  .score-cell.nd-cell .val { color:#ff8888; }
  .score-cell.bonus-cell .val { color:#88ff88; }
  .score-cell.e-cell .val { color:#4a8adf; font-size:16px; }
  .score-cell.eavg-cell .val { color:#7ad4ff; }
  .score-cell.final-cell { background:#1a3a2a; }
  .score-cell.final-cell .val { color:#4adf8f; }
  .unlock-btn { font-size:10px; color:#dfaf4a; cursor:pointer; margin-top:3px; display:block; }

  /* アクションボタン */
  .card-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .btn { padding:11px 16px; border:none; border-radius:10px; color:#fff; font-size:14px; font-weight:700; cursor:pointer; }
  .btn-confirm { flex:1; background:#2a5a8a; }
  .btn-confirm:disabled { background:#1a2a3a; color:#3a4a5a; cursor:not-allowed; }
  .btn-edit { background:#4a3a1a; }
  .btn-reset { background:#3a1a1a; color:#ff6a6a; }

  .empty-state { text-align:center; padding:40px; color:#3a4a5a; font-size:14px; }

  /* モーダル */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; padding:20px; }
  .modal-bg.open { display:flex; }
  .modal { background:#1a2634; border:1px solid #2a3a4a; border-radius:20px; padding:28px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; }
  .modal h3 { font-size:17px; color:#dfaf4a; margin-bottom:20px; }
  .modal-note { font-size:12px; color:#7a8a99; margin-bottom:16px; background:#111d2a; padding:10px 14px; border-radius:8px; line-height:1.6; }
  .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .modal-field label { display:block; font-size:11px; color:#7a8a99; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.08em; }
  .modal-field input { width:100%; padding:10px 12px; background:#0f1923; border:1px solid #2a3a4a; border-radius:8px; color:#fff; font-size:15px; }
  .modal-field input:focus { outline:none; border-color:#dfaf4a; }
  .modal-divider { grid-column:span 2; border-top:1px solid #2a3a4a; margin:4px 0; }
  .modal-actions { display:flex; gap:10px; }
  .btn-save { flex:1; padding:14px; background:#2a6a3a; border:none; border-radius:12px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; }
  .btn-cancel { padding:14px 20px; background:#2a3a4a; border:none; border-radius:12px; color:#aaa; font-size:15px; cursor:pointer; }

  /* 完了画面 */
  #complete { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; text-align:center; }
  #complete .icon { font-size:64px; margin-bottom:16px; }
  #complete h2 { font-size:22px; margin-bottom:12px; color:#4adf8f; }
  #complete p { font-size:15px; color:#7a8a99; line-height:1.7; margin-bottom:24px; }
  .btn-restart { padding:14px 32px; background:#2a5a8a; border:none; border-radius:14px; color:#fff; font-size:16px; font-weight:700; cursor:pointer; }
</style>
</head>
<body>

<div class="demo-banner">🟡 練習用デモ — 実際の大会には接続されていません</div>

<!-- セットアップ -->
<div id="setup">
  <h2>📋 セクレタリー</h2>
  <p class="sub">担当種目を選択してください</p>
  <div class="demo-note">
    📋 <strong>練習モード</strong><br>
    架空の選手と得点データで操作を練習できます。<br>
    選手を選んで登録し、得点が揃ったら「確定」する流れを体験できます。
  </div>
  <div class="gender-tabs">
    <div class="gender-tab mag active" id="tab-mag" onclick="selectGender('MAG')">MAG</div>
    <div class="gender-tab wag" id="tab-wag" onclick="selectGender('WAG')">WAG</div>
  </div>
  <div class="apparatus-grid" id="apparatus-grid"></div>
  <button class="btn-enter" id="btn-enter" onclick="enterMain()" disabled>この種目を担当する →</button>
</div>

<!-- メイン -->
<div id="main-view">
  <div class="header">
    <div>
      <div class="apparatus-badge" id="hdr-badge"></div>
      <div class="apparatus-full" id="hdr-full"></div>
    </div>
    <span class="demo-badge-sm">🟡 練習モード</span>
  </div>
  <div class="hint-bar" id="hint-bar">💡 下の選手リストから演技者をタップして登録してください。登録後、自動で得点が届きます。</div>
  <div class="content" id="content"></div>
</div>

<!-- 編集モーダル -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <h3>✏️ スコア編集</h3>
    <div class="modal-note" id="modal-athlete-name"></div>
    <div class="modal-grid" id="modal-grid"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModalDirect()">キャンセル</button>
      <button class="btn-save" onclick="saveEdit()">保存して反映</button>
    </div>
  </div>
</div>

<!-- 完了画面 -->
<div id="complete">
  <div class="icon">🎉</div>
  <h2>練習完了！</h2>
  <p>全選手の確定操作が終わりました。<br>実際の大会でも同じ操作で進められます。</p>
  <button class="btn-restart" onclick="restart()">もう一度練習する</button>
</div>

<script>
  const APPARATUS = {
    MAG_FX: { label:'FX', full:'Floor Exercise', gender:'MAG', icon:'🟦' },
    MAG_PH: { label:'PH', full:'Pommel Horse',   gender:'MAG', icon:'🐴' },
    MAG_SR: { label:'SR', full:'Still Rings',    gender:'MAG', icon:'⭕' },
    MAG_VT: { label:'VT', full:'Vault',          gender:'MAG', icon:'🏃' },
    MAG_PB: { label:'PB', full:'Parallel Bars',  gender:'MAG', icon:'⚡' },
    MAG_HB: { label:'HB', full:'High Bar',       gender:'MAG', icon:'🔝' },
    WAG_VT: { label:'VT', full:'Vault',          gender:'WAG', icon:'🏃' },
    WAG_UB: { label:'UB', full:'Uneven Bars',    gender:'WAG', icon:'〰️' },
    WAG_BB: { label:'BB', full:'Balance Beam',   gender:'WAG', icon:'🤸' },
    WAG_FX: { label:'FX', full:'Floor Exercise', gender:'WAG', icon:'🟦' },
  };
  const MAG_ORDER = ['MAG_FX','MAG_PH','MAG_SR','MAG_VT','MAG_PB','MAG_HB'];
  const WAG_ORDER = ['WAG_VT','WAG_UB','WAG_BB','WAG_FX'];

  // ダミー選手データ
  const DUMMY_ROSTER = {
    MAG: [
      { bib:'101', name:'山田 太郎', club:'東京体操クラブ', category:'一般' },
      { bib:'102', name:'鈴木 一郎', club:'大阪ジムナスティクス', category:'一般' },
      { bib:'103', name:'田中 健太', club:'名古屋体操アカデミー', category:'ジュニア' },
      { bib:'104', name:'佐藤 雄大', club:'福岡体育協会', category:'ジュニア' },
      { bib:'105', name:'中村 翔平', club:'仙台体操スクール', category:'一般' },
    ],
    WAG: [
      { bib:'201', name:'山田 花子', club:'東京体操クラブ', category:'一般' },
      { bib:'202', name:'鈴木 さくら', club:'大阪ジムナスティクス', category:'一般' },
      { bib:'203', name:'田中 美咲', club:'名古屋体操アカデミー', category:'ジュニア' },
      { bib:'204', name:'佐藤 由美', club:'福岡体育協会', category:'ジュニア' },
      { bib:'205', name:'中村 あかり', club:'仙台体操スクール', category:'一般' },
    ]
  };

  // ダミー得点データ（登録後に自動で届くスコア）
  function makeDummyScores() {
    return [
      { dScore:4.5, nd:0, stickBonus:0, eScores:{ E1:8.1, E2:8.0, E3:7.9, E4:8.2 } },
      { dScore:3.8, nd:0.3, stickBonus:0, eScores:{ E1:7.5, E2:7.6, E3:7.8, E4:7.4 } },
      { dScore:5.2, nd:0, stickBonus:0.3, eScores:{ E1:8.5, E2:8.3, E3:8.4, E4:8.6 } },
      { dScore:4.0, nd:0.1, stickBonus:0, eScores:{ E1:7.9, E2:8.0, E3:7.7, E4:8.1 } },
      { dScore:3.5, nd:0, stickBonus:0, eScores:{ E1:8.2, E2:8.0, E3:8.1, E4:7.9 } },
    ];
  }

  let selectedGender = 'MAG', selectedApp = null, myApparatus = null;
  let editingId = null;
  // entries: { id, athlete, dScore, nd, stickBonus, eScores, confirmed, scoreTimer }
  let entries = [];
  let dummyScorePool = makeDummyScores();

  function floorTo3(x) { return Math.floor(x * 1000 + 1e-9) / 1000; }
  function calcEAvg(eScores) {
    const vals = Object.values(eScores).map(Number).filter(v => !isNaN(v));
    if (vals.length === 0) return null;
    if (vals.length < 3) return floorTo3(vals.reduce((a,v)=>a+v,0)/vals.length);
    const sorted = [...vals].sort((a,b)=>a-b);
    const used = sorted.slice(1,-1);
    return floorTo3(used.reduce((a,v)=>a+v,0)/used.length);
  }

  // ── セットアップ ──
  function selectGender(g) {
    selectedGender = g; selectedApp = null;
    document.getElementById('tab-mag').className = 'gender-tab mag' + (g==='MAG'?' active':'');
    document.getElementById('tab-wag').className = 'gender-tab wag' + (g==='WAG'?' active':'');
    renderAppGrid();
    document.getElementById('btn-enter').disabled = true;
  }
  function renderAppGrid() {
    const order = selectedGender === 'MAG' ? MAG_ORDER : WAG_ORDER;
    document.getElementById('apparatus-grid').innerHTML = order.map(code => {
      const a = APPARATUS[code];
      return `<div class="app-btn ${selectedApp===code?'selected':''}" onclick="selectApp('${code}')">
        <div class="icon">${a.icon}</div><div class="label">${a.label}</div><div class="full">${a.full}</div>
      </div>`;
    }).join('');
  }
  function selectApp(code) { selectedApp = code; renderAppGrid(); document.getElementById('btn-enter').disabled = false; }
  function enterMain() {
    if (!selectedApp) return;
    myApparatus = selectedApp;
    entries = [];
    dummyScorePool = makeDummyScores();
    document.getElementById('setup').style.display = 'none';
    document.getElementById('main-view').style.display = 'flex';
    const a = APPARATUS[myApparatus];
    document.getElementById('hdr-badge').textContent = `${a.icon} ${a.gender} ${a.label}`;
    document.getElementById('hdr-full').textContent = a.full;
    renderContent();
  }
  renderAppGrid();

  // ── 選手登録 ──
  function registerAthlete(bib) {
    const gender = APPARATUS[myApparatus].gender;
    const roster = DUMMY_ROSTER[gender];
    const athlete = roster.find(r => r.bib === bib);
    if (!athlete) return;
    const id = `entry_${bib}_${Date.now()}`;
    const entry = { id, athlete, dScore:null, nd:0, stickBonus:0, eScores:{}, confirmed:false };
    entries.unshift(entry);
    // 2〜4秒後にダミー得点が届く
    const scoreData = dummyScorePool.shift() || { dScore:4.0, nd:0, stickBonus:0, eScores:{E1:8.0,E2:8.0,E3:8.0,E4:8.0} };
    // D得点：1.5秒後
    setTimeout(() => {
      const e = entries.find(e => e.id === id);
      if (!e) return;
      e.dScore = scoreData.dScore;
      e.nd = scoreData.nd;
      e.stickBonus = scoreData.stickBonus;
      renderContent();
    }, 1500);
    // E得点：少しずつ届く
    const eKeys = Object.keys(scoreData.eScores);
    eKeys.forEach((k, i) => {
      setTimeout(() => {
        const e = entries.find(e => e.id === id);
        if (!e) return;
        e.eScores[k] = scoreData.eScores[k];
        renderContent();
      }, 2000 + i * 600);
    });
    renderContent();
    updateHint();
  }

  function updateHint() {
    const unconfirmed = entries.filter(e => !e.confirmed);
    const confirmed = entries.filter(e => e.confirmed);
    const total = DUMMY_ROSTER[APPARATUS[myApparatus].gender].length;
    const registered = entries.length;
    if (confirmed.length === total) {
      document.getElementById('hint-bar').textContent = '🎉 全選手の確定が完了しました！「もう一度練習する」ボタンから再挑戦できます。';
      setTimeout(() => {
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('complete').style.display = 'flex';
      }, 2000);
    } else if (unconfirmed.length > 0) {
      const ready = unconfirmed.filter(e => e.dScore !== null && Object.keys(e.eScores).length >= 4);
      if (ready.length > 0) {
        document.getElementById('hint-bar').textContent = '💡 得点が揃いました。「✓ 得点確定・送信」ボタンを押して確定してください。';
      } else if (registered < total) {
        document.getElementById('hint-bar').textContent = '💡 得点の到着を待っています…届いたら「確定」ボタンが有効になります。次の選手を先に登録することもできます。';
      } else {
        document.getElementById('hint-bar').textContent = '💡 得点の到着を待っています…届き次第「確定」ボタンが有効になります。';
      }
    } else {
      document.getElementById('hint-bar').textContent = '💡 下の選手リストから演技者をタップして登録してください。登録後、自動で得点が届きます。';
    }
  }

  // ── 描画 ──
  function renderContent() {
    const gender = APPARATUS[myApparatus].gender;
    const roster = DUMMY_ROSTER[gender];
    const usedBibs = new Set(entries.map(e => e.athlete.bib));

    let html = `<div class="select-panel"><h3>演技者を選択</h3><div class="athlete-list">`;
    roster.forEach(r => {
      const used = usedBibs.has(r.bib);
      html += `<div class="athlete-item ${used?'used':''}" onclick="registerAthlete('${r.bib}')">
        <div class="bib">${r.bib}</div>
        <div class="cat-tag">${r.category}</div>
        <div><div class="name">${r.name}</div><div class="club">${r.club}</div></div>
      </div>`;
    });
    html += `</div></div>`;

    if (entries.length === 0) {
      html += `<div class="empty-state">演技者を選択するとスコア入力欄が表示されます</div>`;
    } else {
      const sorted = [...entries].sort((a,b) => {
        if (a.confirmed && !b.confirmed) return 1;
        if (!a.confirmed && b.confirmed) return -1;
        return 0;
      });
      sorted.forEach(entry => {
        const { id, athlete, dScore, nd, stickBonus, eScores, confirmed } = entry;
        const eAvg = calcEAvg(eScores);
        const eCount = 4;
        const eKeys = ['E1','E2','E3','E4'];
        const submittedE = eKeys.filter(k => eScores[k] !== undefined).length;
        const allEIn = submittedE >= eCount;
        const canConfirm = dScore !== null && eAvg !== null && !confirmed;
        const liveScore = dScore !== null && eAvg !== null
          ? floorTo3(dScore - nd + stickBonus + eAvg) : null;

        const dWaiting = dScore === null;
        const eCells = eKeys.map(k => {
          const v = eScores[k];
          return `<div class="score-cell e-cell">
            <div class="lbl">${k}</div>
            <div class="val ${v===undefined?(dWaiting?'empty':'pending'):''}">${v!==undefined?Number(v).toFixed(1):(dWaiting?'—':'...')}</div>
            ${!confirmed && v!==undefined ? `<span class="unlock-btn" onclick="unlockJudge('${id}','${k}')">再入力許可</span>` : ''}
          </div>`;
        }).join('');

        html += `<div class="score-card ${confirmed?'confirmed':''}">
          <div class="card-header">
            <div class="header-left">
              <div class="bib-name">${athlete.bib} ${athlete.name}</div>
              <div class="meta"><span class="cat-tag">${athlete.category}</span><span>${athlete.club}</span></div>
            </div>
            <div class="header-right">
              ${confirmed ? '<div class="confirmed-badge">✓ 確定</div>' : ''}
              ${confirmed ? `<button class="btn btn-edit" onclick="unconfirmScore('${id}')">🔓 再編集</button>` : ''}
            </div>
          </div>
          <div class="scores-grid">
            <div class="score-cell d-cell"><div class="lbl">D</div><div class="val ${dScore===null?'pending':''}">${dScore!==null?Number(dScore).toFixed(1):'...'}</div></div>
            <div class="score-cell eavg-cell"><div class="lbl">E AVG</div><div class="val ${eAvg===null?'empty':''}">${eAvg!==null?eAvg.toFixed(3):'—'}</div></div>
            <div class="score-cell nd-cell"><div class="lbl">ND</div><div class="val">-${Number(nd).toFixed(1)}</div></div>
            <div class="score-cell bonus-cell"><div class="lbl">BONUS</div><div class="val">+${Number(stickBonus).toFixed(1)}</div></div>
            ${eCells}
            <div class="score-cell final-cell"><div class="lbl">SCORE</div><div class="val ${liveScore===null?'empty':''}">${liveScore!==null?liveScore.toFixed(3):'—'}</div></div>
          </div>
          ${!confirmed ? `<div class="card-actions">
            <button class="btn btn-confirm" onclick="confirmScore('${id}')" ${canConfirm?'':'disabled'}>${canConfirm?'✓ 得点確定・送信':dScore===null?'Dスコア待ち...':!allEIn?`Eスコア待ち（${submittedE}/${eCount}人）`:'確定できません'}</button>
            <button class="btn btn-edit" onclick="openEdit('${id}')">✏️ 編集</button>
            <button class="btn btn-reset" onclick="resetScore('${id}')">リセット</button>
          </div>` : ''}
        </div>`;
      });
    }

    document.getElementById('content').innerHTML = html;
    updateHint();
  }

  // ── アクション ──
  function confirmScore(id) {
    if (!confirm('この得点を確定して記録本部に送信しますか？（デモ）')) return;
    const e = entries.find(e => e.id === id);
    if (e) { e.confirmed = true; renderContent(); }
  }

  function unconfirmScore(id) {
    if (!confirm('確定を取り消して再編集しますか？')) return;
    const e = entries.find(e => e.id === id);
    if (e) { e.confirmed = false; renderContent(); }
  }

  function resetScore(id) {
    if (!confirm('このエントリーをリセットして選び直しますか？')) return;
    entries = entries.filter(e => e.id !== id);
    renderContent();
  }

  function unlockJudge(id, judgeKey) {
    if (!confirm(`${judgeKey} の再入力を許可しますか？\n（デモ：スコアがリセットされます）`)) return;
    const e = entries.find(e => e.id === id);
    if (e) { delete e.eScores[judgeKey]; renderContent(); }
  }

  // ── 編集モーダル ──
  function openEdit(id) {
    editingId = id;
    const e = entries.find(e => e.id === id);
    if (!e) return;
    document.getElementById('modal-athlete-name').textContent =
      `${e.athlete.bib} ${e.athlete.name}（${e.athlete.club}）`;
    let html = `
      <div class="modal-field"><label>D スコア</label><input id="me-d" type="number" step="0.1" min="0" value="${e.dScore ?? ''}"></div>
      <div class="modal-field"><label>ND（減点）</label><input id="me-nd" type="number" step="0.1" min="0" value="${e.nd ?? 0}"></div>
      <div class="modal-field" style="grid-column:span 2"><label>BONUS（加点）</label><input id="me-bonus" type="number" step="0.1" min="0" value="${e.stickBonus ?? 0}"></div>
      <div class="modal-divider"></div>`;
    ['E1','E2','E3','E4'].forEach(k => {
      const v = e.eScores[k];
      html += `<div class="modal-field"><label>${k}</label><input id="me-${k}" type="number" step="0.1" min="0" max="10" placeholder="未入力" value="${v !== undefined ? Number(v) : ''}"></div>`;
    });
    document.getElementById('modal-grid').innerHTML = html;
    document.getElementById('modal-bg').className = 'modal-bg open';
  }

  function closeModal(ev) { if (ev.target.id === 'modal-bg') closeModalDirect(); }
  function closeModalDirect() {
    document.getElementById('modal-bg').className = 'modal-bg';
    editingId = null;
  }

  function saveEdit() {
    if (!editingId) return;
    const e = entries.find(e => e.id === editingId);
    if (!e) return;
    const d = document.getElementById('me-d').value;
    const nd = document.getElementById('me-nd').value;
    const bonus = document.getElementById('me-bonus').value;
    e.dScore = d !== '' ? parseFloat(d) : null;
    e.nd = nd !== '' ? parseFloat(nd) : 0;
    e.stickBonus = bonus !== '' ? parseFloat(bonus) : 0;
    ['E1','E2','E3','E4'].forEach(k => {
      const v = document.getElementById(`me-${k}`)?.value;
      if (v !== undefined && v !== '') e.eScores[k] = parseFloat(v);
      else delete e.eScores[k];
    });
    closeModalDirect();
    renderContent();
  }

  function restart() {
    document.getElementById('complete').style.display = 'none';
    document.getElementById('setup').style.display = 'flex';
    entries = [];
    selectedApp = null;
    renderAppGrid();
    document.getElementById('btn-enter').disabled = true;
  }
</script>
</body>
</html>
